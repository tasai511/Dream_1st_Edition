<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ドリーム記録">
    <title>ドリーム1号 記録アプリ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ドリーム1号</p>
          <h1>素振り記録</h1>
        </div>
        <div class="sync-badge" id="storageStatus">端末保存</div>
      </header>

      <nav class="mode-tabs" aria-label="モード切り替え">
        <button class="tab-button active" type="button" data-mode="input">入力</button>
        <button class="tab-button" type="button" data-mode="view">閲覧</button>
      </nav>

      <main>
        <section class="mode-panel active" id="inputMode">
          <section class="section-block">
            <div class="section-heading">
              <h2>登録</h2>
              <p>名前とバットを追加できます。</p>
            </div>
            <div class="register-grid">
              <form class="inline-form" id="nameForm">
                <label for="newName">名前</label>
                <div class="inline-row">
                  <input id="newName" name="newName" type="text" autocomplete="off" placeholder="はるた">
                  <button type="submit">追加</button>
                </div>
              </form>
              <form class="inline-form" id="batForm">
                <label for="newBat">バット</label>
                <div class="inline-row">
                  <input id="newBat" name="newBat" type="text" autocomplete="off" placeholder="青いバット">
                  <button type="submit">追加</button>
                </div>
              </form>
            </div>
            <div class="chips-row" id="masterChips"></div>
          </section>

          <section class="section-block">
            <div class="section-heading">
              <h2>今日の記録</h2>
              <p>同じ日付・名前・バットは自動で合算します。</p>
            </div>
            <form id="recordForm" class="record-form">
              <input type="hidden" id="editingId">
              <div class="form-grid">
                <label>
                  <span>名前</span>
                  <select id="recordName" required></select>
                </label>
                <label>
                  <span>バット</span>
                  <select id="recordBat" required></select>
                </label>
                <label>
                  <span>日付</span>
                  <input id="recordDate" type="date" required>
                </label>
                <label>
                  <span>回数</span>
                  <input id="recordCount" type="number" inputmode="numeric" min="1" step="1" required placeholder="50">
                </label>
                <label>
                  <span>平均スコア</span>
                  <input id="recordAverage" type="number" inputmode="decimal" min="0" step="0.1" required placeholder="460">
                </label>
                <label>
                  <span>ベストスコア</span>
                  <input id="recordBest" type="number" inputmode="decimal" min="0" step="0.1" required placeholder="520">
                </label>
              </div>
              <div class="form-actions">
                <button class="primary-button" type="submit" id="saveRecordButton">保存</button>
                <button class="ghost-button hidden" type="button" id="cancelEditButton">編集をやめる</button>
              </div>
            </form>
          </section>

          <section class="section-block">
            <div class="section-heading">
              <h2>最近の入力</h2>
              <p>編集すると合算済みの1日分を書き換えます。</p>
            </div>
            <div class="history-list" id="historyList"></div>
          </section>
        </section>

        <section class="mode-panel" id="viewMode">
          <section class="section-block">
            <div class="section-heading">
              <h2>記録を見る</h2>
              <p>選択を変えるとグラフも更新されます。</p>
            </div>
            <div class="filter-grid">
              <label>
                <span>名前</span>
                <select id="filterName"></select>
              </label>
              <label>
                <span>バット</span>
                <select id="filterBat"></select>
              </label>
              <label>
                <span>期間</span>
                <select id="filterPeriod">
                  <option value="7">1週間</option>
                  <option value="30">1ヶ月</option>
                  <option value="90">3ヶ月</option>
                  <option value="180">6ヶ月</option>
                  <option value="365">1年</option>
                  <option value="all">全期間</option>
                </select>
              </label>
            </div>
          </section>

          <section class="summary-band" aria-live="polite">
            <div>
              <span>期間内の総素振り</span>
              <strong id="totalCount">0回</strong>
            </div>
            <div>
              <span>記録日数</span>
              <strong id="recordDays">0日</strong>
            </div>
          </section>

          <section class="chart-section">
            <div class="chart-legend">
              <span><i class="legend-dot average"></i>平均</span>
              <span><i class="legend-dot best"></i>ベスト</span>
            </div>
            <div class="chart-wrap">
              <canvas id="scoreChart" width="900" height="520" aria-label="平均スコアとベストスコアのグラフ"></canvas>
              <div class="chart-empty" id="chartEmpty">記録を入力するとグラフが表示されます。</div>
              <div class="tooltip hidden" id="chartTooltip"></div>
            </div>
          </section>
        </section>

        <section class="section-block data-tools">
          <div class="section-heading">
            <h2>CSV</h2>
            <p>端末変更やバックアップに使えます。</p>
          </div>
          <div class="csv-actions">
            <button type="button" id="demoDataButton">デモデータ追加</button>
            <button type="button" id="exportCsvButton">CSVエクスポート</button>
            <label class="file-button">
              CSVインポート
              <input id="importCsvInput" type="file" accept=".csv,text/csv">
            </label>
          </div>
          <p class="notice" id="notice" role="status" aria-live="polite"></p>
        </section>
      </main>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
